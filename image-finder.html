    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap');

        :root {
            --primary: #004ac6;
            --primary-glow: rgba(0, 74, 198, 0.3);
            --secondary: #495c95;
            --surface: #f8f9fb;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        body { 
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }
        
        h1, h2, h3, .brand-font { font-family: 'Manrope', sans-serif; }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: linear-gradient(135deg, #f8f9fb 0%, #edeef0 100%);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s ease-out;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 16px;
            word-wrap: break-word;
        }

        .message.bot .message-bubble {
            background: white;
            color: #191c1e;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .message.user .message-bubble {
            background: #004ac6;
            color: white;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chat-input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e1e2e4;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
            padding: 0;
            margin-top: 12px;
        }

        .image-item {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            aspect-ratio: 1;
            cursor: pointer;
            transition: transform 0.3s ease;
            background: #f0f0f0;
        }

        .image-item:hover {
            transform: scale(1.05);
        }

        .image-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            color: white;
            padding: 8px;
            font-size: 11px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .image-item:hover .image-overlay {
            opacity: 1;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 32px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-height: 85vh;
            overflow-y: auto;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--surface);
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        .gsi_outer_content {
            width: 100% !important;
        }
    </style>
</head>

<script>
    // Client ID dùng ở frontend (Google OAuth cho web app - không phải secret)
    const GOOGLE_CLIENT_ID = '844249668292-hgk5167darjhn9vsptmr9bfn31dh7d3a.apps.googleusercontent.com';
    const DISCOVERY_DOCS = ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'];
    const SCOPES = 'https://www.googleapis.com/auth/drive.readonly https://www.googleapis.com/auth/userinfo.email openid profile';

    let allDriveImages = [];
    let currentUser = null;
    let gapiInited = false;
    let tokenClient = null;
    let isLoadingDrive = false;

    function normalizeText(text) {
        return (text || '')
            .toLowerCase()
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .replace(/đ/g, 'd');
    }

    function scoreImage(image, query) {
        const name = normalizeText(image.name);
        const keywords = normalizeText(query).split(/\s+/).filter(Boolean);
        if (!keywords.length) return 0;

        let score = 0;
        const parts = name.split(/[\s._\-]+/);

        keywords.forEach((keyword) => {
            if (name.includes(keyword)) {
                score += 12;
                return;
            }

            if (parts.some((part) => part.startsWith(keyword) || keyword.startsWith(part))) {
                score += 7;
            }
        });

        if (keywords.every((keyword) => name.includes(keyword))) {
            score += 25;
        }

        return score;
    }

    function searchImages(query) {
        return allDriveImages
            .map((image) => ({ image, score: scoreImage(image, query) }))
            .filter((result) => result.score > 0)
            .sort((a, b) => b.score - a.score || new Date(b.image.createdTime) - new Date(a.image.createdTime))
            .map((result) => result.image);
    }

    function waitForGoogleLibs() {
        return new Promise((resolve, reject) => {
            let attempts = 0;
            const timer = setInterval(() => {
                attempts += 1;
                if (window.gapi && window.google?.accounts?.oauth2) {
                    clearInterval(timer);
                    resolve();
                    return;
                }
                if (attempts > 100) {
                    clearInterval(timer);
                    reject(new Error('Google libraries failed to load'));
                }
            }, 100);
        });
    }

    async function initializeApp() {
        const statusEl = document.getElementById('loadingStatus');
        statusEl.textContent = 'Đang khởi tạo Google Sign-In...';

        try {
            await waitForGoogleLibs();

            await new Promise((resolve, reject) => {
                gapi.load('client', async () => {
                    try {
                        await gapi.client.init({ discoveryDocs: DISCOVERY_DOCS });
                        gapiInited = true;
                        resolve();
                    } catch (error) {
                        reject(error);
                    }
                });
            });

            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: GOOGLE_CLIENT_ID,
                scope: SCOPES,
                callback: handleTokenResponse,
            });

            renderGoogleLoginButton();
            statusEl.textContent = 'Đăng nhập bằng Gmail để tìm ảnh trong Google Drive của bạn';
        } catch (error) {
            console.error('Init error:', error);
            statusEl.textContent = 'Không tải được Google Sign-In. Vui lòng tải lại trang.';
        }
    }

    function renderGoogleLoginButton() {
        const container = document.getElementById('googleLoginButton');
        container.innerHTML = '';

        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'w-full flex items-center justify-center gap-3 border border-slate-300 rounded-full px-6 py-3 bg-white hover:bg-slate-50 transition-colors font-semibold text-slate-700';
        button.innerHTML = `
            <svg width="20" height="20" viewBox="0 0 48 48" aria-hidden="true">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.56 2.95-2.24 5.45-4.78 7.14l7.73 6.01c4.52-4.18 7.12-10.33 7.12-17.62z"/>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C2.38 16.62 0 20.04 0 24s2.38 7.38 6.56 10.78l7.97-6.19z"/>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6.01c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            Đăng nhập bằng Gmail
        `;
        button.onclick = () => {
            if (!tokenClient) return;
            document.getElementById('loadingStatus').textContent = 'Đang mở cửa sổ đăng nhập Google...';
            tokenClient.requestAccessToken({ prompt: 'consent' });
        };

        container.appendChild(button);
    }

    async function handleTokenResponse(response) {
        const statusEl = document.getElementById('loadingStatus');

        if (response.error) {
            statusEl.textContent = 'Đăng nhập không thành công. Vui lòng thử lại.';
            return;
        }

        gapi.client.setToken(response);

        try {
            const userInfo = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                headers: { Authorization: `Bearer ${response.access_token}` }
            }).then((res) => res.json());

            currentUser = userInfo;
            showChatScreen();
            await loadDriveImages();
        } catch (error) {
            console.error('Login error:', error);
            statusEl.textContent = 'Đăng nhập thành công nhưng không đọc được tài khoản. Vui lòng thử lại.';
        }
    }

    async function loadDriveImages() {
        if (!gapiInited || isLoadingDrive) return;

        isLoadingDrive = true;
        addMessage('⏳ Đang quét ảnh trong Google Drive...', 'bot', true);

        try {
            allDriveImages = [];
            let pageToken = null;

            do {
                const response = await gapi.client.drive.files.list({
                    q: "trashed=false and mimeType contains 'image/'",
                    spaces: 'drive',
                    fields: 'nextPageToken, files(id,name,mimeType,createdTime,webContentLink,thumbnailLink)',
                    pageSize: 100,
                    pageToken,
                    orderBy: 'createdTime desc'
                });

                allDriveImages.push(...(response.result.files || []));
                pageToken = response.result.nextPageToken;
            } while (pageToken && allDriveImages.length < 500);

            removeLastMessage();

            if (allDriveImages.length > 0) {
                addMessage(`📁 Đã tìm thấy ${allDriveImages.length} ảnh trong Drive của bạn`, 'bot');
            } else {
                addMessage('📁 Chưa thấy ảnh nào trong Google Drive. Hãy thử upload ảnh rồi quay lại.', 'bot');
            }

            addMessage('💡 Gõ mô tả hoặc từ khóa, ví dụ: "tết", "team", "quay phim", "logo"...', 'bot');
        } catch (error) {
            console.error('Error loading Drive images:', error);
            removeLastMessage();
            addMessage('Không tải được ảnh từ Drive. Hãy đăng xuất và đăng nhập lại.', 'bot');
        } finally {
            isLoadingDrive = false;
        }
    }

    // Search images
    document.getElementById('chatForm').addEventListener('submit', (e) => {
        e.preventDefault();
        
        const prompt = document.getElementById('promptInput').value.trim().toLowerCase();
        if (!prompt) return;
        
        addMessage(prompt, 'user');
        document.getElementById('promptInput').value = '';
        document.getElementById('sendBtn').disabled = true;
        
        addMessage('🔍 Đang tìm kiếm...', 'bot', true);
        
        setTimeout(() => {
            try {
                const filteredImages = searchImages(prompt);

                removeLastMessage();

                if (filteredImages.length > 0) {
                    addImageGallery(filteredImages, prompt);
                    addMessage(`✅ Tìm thấy ${filteredImages.length} ảnh phù hợp với "${prompt}"`, 'bot');
                } else {
                    addMessage(`😕 Không thấy ảnh nào khớp "${prompt}". Thử từ khóa ngắn hơn hoặc tên file trong Drive.`, 'bot');
                }
            } catch (error) {
                console.error('Error:', error);
                removeLastMessage();
                addMessage('Có lỗi xảy ra khi tìm kiếm.', 'bot');
            }
            
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('promptInput').focus();
        }, 500);
    });

    function addMessage(text, sender = 'bot', isLoading = false) {
        const messagesDiv = document.querySelector('.chat-messages');
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${sender}`;
        
        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        
        if (isLoading) {
            bubble.innerHTML = `<div class="flex items-center gap-2"><div class="loading-spinner"></div> ${text}</div>`;
        } else {
            bubble.textContent = text;
        }
        
        messageDiv.appendChild(bubble);
        messagesDiv.appendChild(messageDiv);
        
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function removeLastMessage() {
        const messages = document.querySelectorAll('.message');
        if (messages.length > 0) {
            messages[messages.length - 1].remove();
        }
    }

    function addImageGallery(images, searchQuery) {
        const messagesDiv = document.querySelector('.chat-messages');
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message bot';
        
        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        bubble.style.maxWidth = '85%';
        
        const gallery = document.createElement('div');
        gallery.className = 'image-grid';
        
        images.slice(0, 12).forEach(image => {
            const imageItem = document.createElement('div');
            imageItem.className = 'image-item';
            imageItem.onclick = () => openImageModal(image);
            
            const img = document.createElement('img');
            img.src = image.thumbnailLink ? image.thumbnailLink.replace('=s220', '=s300') : `https://drive.google.com/thumbnail?id=${image.id}&sz=w200`;
            img.alt = image.name;
            img.loading = 'lazy';
            
            const overlay = document.createElement('div');
            overlay.className = 'image-overlay';
            overlay.innerHTML = `<div class="font-semibold truncate text-xs">${image.name.substring(0, 15)}</div>`;
            
            imageItem.appendChild(img);
            imageItem.appendChild(overlay);
            gallery.appendChild(imageItem);
        });
        
        bubble.appendChild(gallery);
        messageDiv.appendChild(bubble);
        messagesDiv.appendChild(messageDiv);
        
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function openImageModal(image) {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.onclick = () => modal.remove();
        
        const content = document.createElement('div');
        content.className = 'modal-content';
        content.onclick = (e) => e.stopPropagation();
        
        const previewUrl = `https://drive.google.com/uc?id=${image.id}&export=view`;
        
        content.innerHTML = `
            <button onclick="this.closest('.modal-overlay').remove()" class="float-right mb-4 text-slate-600 hover:text-primary">
                <span class="material-symbols-outlined">close</span>
            </button>
            <div style="clear: both;"></div>
            <img src="${previewUrl}" alt="${image.name}" class="w-full rounded-lg mb-6 max-h-96 object-contain">
            <h3 class="text-lg font-bold mb-2">${image.name}</h3>
            <p class="text-on-surface-variant mb-6 text-sm">Tạo lúc: ${new Date(image.createdTime).toLocaleDateString('vi-VN')}</p>
            <div class="flex gap-3 flex-col sm:flex-row">
                <a href="${previewUrl}" target="_blank" class="flex-1 bg-primary text-on-primary py-3 rounded-full font-semibold text-center hover:opacity-90 transition-opacity">
                    Xem Trong Tab Mới
                </a>
                <a href="${image.webContentLink}&export=download" class="flex-1 bg-secondary-container text-on-surface py-3 rounded-full font-semibold text-center hover:opacity-90 transition-opacity">
                    Tải Xuống
                </a>
            </div>
        `;
        
        modal.appendChild(content);
        document.body.appendChild(modal);
    }

    function logout() {
        const token = gapi.client.getToken();
        if (token?.access_token) {
            google.accounts.oauth2.revoke(token.access_token, () => {
                gapi.client.setToken(null);
            });
        }

        allDriveImages = [];
        currentUser = null;
        isLoadingDrive = false;

        document.getElementById('chatScreen').classList.add('hidden');
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('loadingStatus').textContent = 'Đăng nhập bằng Gmail để tìm ảnh trong Google Drive của bạn';
        document.querySelector('.chat-messages').innerHTML = `
            <div class="message bot">
                <div class="message-bubble">
                    👋 Xin chào! Hãy mô tả ảnh bạn muốn tìm!
                </div>
            </div>
        `;

        renderGoogleLoginButton();
    }

    function showChatScreen() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('chatScreen').classList.remove('hidden');
        
        if (currentUser) {
            document.getElementById('userEmail').textContent = currentUser.email || 'Google User';
        }
    }

    window.addEventListener('load', initializeApp);
</script>

</body>
</html>
